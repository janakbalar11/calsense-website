<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#36C5F0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#36C5F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="footFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123F63"/>
      <stop offset="100%" stop-color="#0B2A44"/>
    </linearGradient>
  </defs>

  <circle cx="240" cy="230" r="220" fill="url(#glow)"/>

  <!-- Stylized foot / sole outline -->
  <path d="M240 60
           C 300 60 330 120 328 180
           C 326 230 300 250 305 300
           C 312 365 350 390 345 440
           C 340 480 290 500 240 500
           C 185 500 140 475 138 430
           C 136 385 165 360 168 310
           C 171 255 150 235 150 185
           C 150 120 180 60 240 60 Z"
        fill="url(#footFill)" stroke="#1C5C8A" stroke-width="1.5"/>

  <!-- Connecting network lines -->
  <g stroke="#36C5F0" stroke-width="1" stroke-opacity="0.55">
    <line x1="205" y1="130" x2="270" y2="115"/>
    <line x1="270" y1="115" x2="240" y2="200"/>
    <line x1="205" y1="130" x2="240" y2="200"/>
    <line x1="240" y1="200" x2="185" y2="260"/>
    <line x1="240" y1="200" x2="300" y2="270"/>
    <line x1="185" y1="260" x2="300" y2="270"/>
    <line x1="185" y1="260" x2="210" y2="360"/>
    <line x1="300" y1="270" x2="270" y2="360"/>
    <line x1="210" y1="360" x2="270" y2="360"/>
    <line x1="210" y1="360" x2="240" y2="440"/>
    <line x1="270" y1="360" x2="240" y2="440"/>
  </g>

  <!-- Pressure sensor nodes -->
  <g>
    <circle cx="205" cy="130" r="7" fill="#00A6A6"/>
    <circle cx="270" cy="115" r="9" fill="#36C5F0"/>
    <circle cx="240" cy="200" r="11" fill="#36C5F0"/>
    <circle cx="185" cy="260" r="8" fill="#00A6A6"/>
    <circle cx="300" cy="270" r="10" fill="#36C5F0"/>
    <circle cx="210" cy="360" r="9" fill="#00A6A6"/>
    <circle cx="270" cy="360" r="8" fill="#00A6A6"/>
    <circle cx="240" cy="440" r="12" fill="#36C5F0"/>
  </g>

  <!-- pulse ring on highest-pressure node -->
  <circle cx="240" cy="440" r="12" fill="none" stroke="#36C5F0" stroke-width="2" stroke-opacity="0.6">
    <animate attributeName="r" values="12;34;12" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.6;0;0.6" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- floating data chip -->
  <g transform="translate(320,80)">
    <rect width="120" height="54" rx="12" fill="#0E3A5D" stroke="#36C5F0" stroke-opacity="0.5"/>
    <text x="16" y="22" font-family="IBM Plex Mono, monospace" font-size="10" fill="#36C5F0">PRESSURE</text>
    <text x="16" y="40" font-family="IBM Plex Mono, monospace" font-size="14" fill="#FFFFFF" font-weight="700">78 kPa</text>
  </g>

  <g transform="translate(30,360)">
    <rect width="120" height="54" rx="12" fill="#0E3A5D" stroke="#00A6A6" stroke-opacity="0.5"/>
    <text x="16" y="22" font-family="IBM Plex Mono, monospace" font-size="10" fill="#00A6A6">BATTERY</text>
    <text x="16" y="40" font-family="IBM Plex Mono, monospace" font-size="14" fill="#FFFFFF" font-weight="700">86%</text>
  </g>
</svg>
